name: Poll Telegram

on:
  schedule:
    - cron: '*/10 * * * *'   # каждые 10 минут
  workflow_dispatch: {}       # ручной запуск для теста

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      # Восстанавливаем state.json из кеша
      - uses: actions/cache/restore@v4
        with:
          path: state.json
          key: bot-state-dummy
          restore-keys: bot-state-

      - run: python bot.py poll
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}

      # Сохраняем state.json в кеш (уникальный ключ каждый раз)
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: bot-state-${{ github.run_id }}-${{ github.run_attempt }}

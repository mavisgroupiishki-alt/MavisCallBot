name: Daily Report

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Дата (YYYY-MM-DD), пусто = вчера'
        required: false
      mode:
        description: 'Режим: report (из чата) или bitrix-report (из Bitrix24)'
        required: false
        default: 'report'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - uses: actions/cache/restore@v4
        with:
          path: state.json
          key: bot-state-dummy
          restore-keys: bot-state-

      - run: python bot.py ${{ github.event.inputs.mode || 'report' }} ${{ github.event.inputs.date }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
          REPORT_CHAT_ID: ${{ secrets.REPORT_CHAT_ID }}

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: bot-state-report-${{ github.run_id }}

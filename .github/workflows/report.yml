name: Daily Report

on:
  schedule:
    - cron: '0 6 * * *'      # 6:00 UTC = 9:00 по Минску
  workflow_dispatch:           # ручной запуск
    inputs:
      date:
        description: 'Дата отчёта (YYYY-MM-DD), пусто = вчера'
        required: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      # Восстанавливаем state.json
      - uses: actions/cache/restore@v4
        with:
          path: state.json
          key: bot-state-dummy
          restore-keys: bot-state-

      - run: python bot.py report ${{ github.event.inputs.date }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}

      # Сохраняем обновлённый state (после очистки старых записей)
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: bot-state-report-${{ github.run_id }}
